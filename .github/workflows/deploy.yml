name: Deploy Lambda

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-model:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache tflite model
        id: cache-model
        uses: actions/cache@v4
        with:
          path: retinaface/retinaface.tflite
          key: tflite-${{ hashFiles('retinaface/**/*.py') }}

      - name: Set up Python
        if: steps.cache-model.outputs.cache-hit != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.cache-model.outputs.cache-hit != 'true'
        run: pip install poetry && poetry install --with dev

      - name: Build tflite model
        if: steps.cache-model.outputs.cache-hit != 'true'
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: poetry run python retinaface/convert_model.py

      - uses: actions/upload-artifact@v4
        with:
          name: retinaface-tflite
          path: retinaface/retinaface.tflite

  deploy:
    needs: build-model
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: retinaface-tflite
          path: retinaface/

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f lambda/Dockerfile -t $REGISTRY/$REPOSITORY:$IMAGE_TAG .
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG
          docker tag $REGISTRY/$REPOSITORY:$IMAGE_TAG $REGISTRY/$REPOSITORY:latest
          docker push $REGISTRY/$REPOSITORY:latest

      - name: Update Lambda
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          aws lambda update-function-code \
            --function-name ${{ secrets.LAMBDA_FUNCTION_NAME }} \
            --image-uri $REGISTRY/$REPOSITORY:$IMAGE_TAG
