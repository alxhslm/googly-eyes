name: PR Checks

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install test dependencies
        run: pip install pytest numpy pillow
      - name: Run tests
        run: pytest tests/ -v
        env:
          PYTHONPATH: ${{ github.workspace }}

  build-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore cached tflite model
        id: cache-model
        uses: actions/cache/restore@v4
        with:
          path: retinaface/retinaface.tflite
          key: tflite-${{ hashFiles('retinaface/**/*.py') }}

      - name: Build Lambda image
        if: steps.cache-model.outputs.cache-hit == 'true'
        run: docker build -f lambda/Dockerfile -t googly-eyes-lambda:pr .

      - name: Skip image build (no cached model)
        if: steps.cache-model.outputs.cache-hit != 'true'
        run: echo "Skipping image build — no cached tflite model (will be validated on merge to main)"
